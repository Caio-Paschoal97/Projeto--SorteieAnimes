<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎌 Maratone este Anime</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d4d">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <header>
            <h1>🎌 Maratone este Anime</h1>
            <p class="subtitle">Descubra sua próxima aventura japonesa</p>
        </header>

        <div class="hero-section">
            <img src="https://gyabbo.wordpress.com/wp-content/uploads/2020/12/b68f4-hara-hetta.jpg?w=584" alt="Anime Banner" class="main-banner">
            <p class="instruction">Clique no botão para sortear um anime aleatório!</p>
            <button id="btnSortear">Sortear Anime 🎲</button>
        </div>

        <section id="anime"></section>

        <div id="mapa-container">
            <p id="status-localizacao" class="geo-info">📍 Buscando sua localização...</p>
            <div id="map"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
